<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trek Finder</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Inter, Arial, sans-serif;
      }

      body {
        background: #f4f6f8;
      }

      header {
        background: #14532d;
        color: #fff;
        padding: 16px 24px;
        font-size: 22px;
        font-weight: 700;
      }

      .container {
        display: grid;
        grid-template-columns: 350px 1fr;
        height: calc(100vh - 60px);
      }

      .sidebar {
        background: white;
        overflow: auto;
        border-right: 1px solid #ddd;
        padding: 18px;
      }

      #map {
        width: 100%;
        height: 100%;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #166534;
        color: white;
        font-size: 15px;
        margin-bottom: 15px;
      }

      button:hover {
        background: #14532d;
      }

      .card {
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 12px;
      }

      .card h3 {
        margin-bottom: 6px;
      }

      .badge {
        display: inline-block;
        background: #d1fae5;
        color: #065f46;
        padding: 3px 8px;
        border-radius: 20px;
        font-size: 12px;
        margin-top: 8px;
      }

      small {
        color: #666;
      }

      @media (max-width: 768px) {
        .container {
          grid-template-columns: 1fr;
        }

        .sidebar {
          height: 45vh;
        }

        #map {
          height: 55vh;
        }
      }
    </style>
  </head>
  <body>
    <header>🏔 Trek Finder (OpenStreetMap)</header>

    <div class="container">
      <div class="sidebar">
        <button id="locateBtn">Find Treks Near Me</button>

        <div id="status">Click the button to search nearby hiking trails.</div>

        <hr style="margin: 15px 0" />

        <div id="results"></div>
      </div>

      <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
      const map = L.map("map").setView([20.5937, 78.9629], 5);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "© OpenStreetMap contributors",
      }).addTo(map);

      const results = document.getElementById("results");
      const statusBox = document.getElementById("status");

      document.getElementById("locateBtn").onclick = () => {
        if (!navigator.geolocation) {
          statusBox.innerHTML = "Geolocation is not supported.";
          return;
        }

        statusBox.innerHTML = "Getting your location...";

        navigator.geolocation.getCurrentPosition(
          async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;

            map.setView([lat, lon], 13);

            L.marker([lat, lon])
              .addTo(map)
              .bindPopup("You are here")
              .openPopup();

            statusBox.innerHTML = "Searching nearby hiking routes...";

            const radius = 10000;

            const query = `
[out:json];
(
node["tourism"="attraction"](around:${radius},${lat},${lon});
node["natural"="peak"](around:${radius},${lat},${lon});
node["leisure"="nature_reserve"](around:${radius},${lat},${lon});
way["route"="hiking"](around:${radius},${lat},${lon});
relation["route"="hiking"](around:${radius},${lat},${lon});
);
out center;
`;

            const response = await fetch(
              "https://overpass-api.de/api/interpreter",
              {
                method: "POST",
                body: query,
              },
            );

            const data = await response.json();

            results.innerHTML = "";

            if (data.elements.length === 0) {
              statusBox.innerHTML = "No trekking places found.";

              return;
            }

            statusBox.innerHTML = `Found ${data.elements.length} places`;

            data.elements.forEach((item) => {
              const latitude = item.lat || item.center?.lat;
              const longitude = item.lon || item.center?.lon;

              if (!latitude || !longitude) return;

              const name = item.tags?.name || "Unnamed Trek";

              L.marker([latitude, longitude])
                .addTo(map)
                .bindPopup(`<b>${name}</b>`);

              const div = document.createElement("div");

              div.className = "card";

              div.innerHTML = `
<h3>${name}</h3>
<small>${item.tags?.tourism || item.tags?.natural || item.tags?.route || "Trail"}</small>
<br>
<span class="badge">${latitude.toFixed(5)}, ${longitude.toFixed(5)}</span>
`;

              div.onclick = () => {
                map.setView([latitude, longitude], 15);
              };

              results.appendChild(div);
            });
          },
          () => {
            statusBox.innerHTML = "Location permission denied.";
          },
        );
      };
    </script>
  </body>
</html>
